name: iftatrack_mobile
description: IFTATrack – Fuel and compliance tracking for precision logistics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Auth
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  
  # State management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^13.2.1
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Location
  geolocator: ^11.1.0
  
  # Images & Files
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  flutter_pdfview: ^1.3.2
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6
  geocoding: ^4.0.0
  onesignal_flutter: ^5.5.4
  path: ^1.9.1
  lottie: ^3.3.1
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
