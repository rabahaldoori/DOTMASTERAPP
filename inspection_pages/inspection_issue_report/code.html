<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-secondary-fixed": "#001848",
                  "primary-fixed": "#d8e2ff",
                  "on-secondary-container": "#fefcff",
                  "on-background": "#151c27",
                  "on-error-container": "#93000a",
                  "primary-container": "#1a2b4a",
                  "on-tertiary-fixed": "#181c1e",
                  "primary": "#031634",
                  "surface-variant": "#dce2f3",
                  "background": "#f9f9ff",
                  "secondary-fixed-dim": "#b2c5ff",
                  "on-surface": "#151c27",
                  "on-error": "#ffffff",
                  "surface-container-low": "#f0f3ff",
                  "surface-bright": "#f9f9ff",
                  "on-tertiary-fixed-variant": "#43474a",
                  "on-secondary-fixed-variant": "#0040a2",
                  "outline-variant": "#c5c6cf",
                  "on-tertiary-container": "#8f9396",
                  "inverse-primary": "#b6c6ee",
                  "error": "#ba1a1a",
                  "error-container": "#ffdad6",
                  "surface-container-lowest": "#ffffff",
                  "secondary-fixed": "#dae2ff",
                  "on-primary-fixed-variant": "#364767",
                  "tertiary": "#13181a",
                  "tertiary-fixed-dim": "#c3c7ca",
                  "outline": "#75777e",
                  "primary-fixed-dim": "#b6c6ee",
                  "on-primary-container": "#8293b7",
                  "inverse-on-surface": "#ebf1ff",
                  "secondary-container": "#356ee7",
                  "inverse-surface": "#2a313d",
                  "on-secondary": "#ffffff",
                  "surface-container-highest": "#dce2f3",
                  "on-tertiary": "#ffffff",
                  "tertiary-fixed": "#e0e3e6",
                  "surface-container-high": "#e2e8f8",
                  "on-primary-fixed": "#081b39",
                  "surface-dim": "#d3daea",
                  "secondary": "#0453cd",
                  "surface": "#f9f9ff",
                  "on-surface-variant": "#44474e",
                  "surface-tint": "#4e5e80",
                  "surface-container": "#e7eefe",
                  "on-primary": "#ffffff",
                  "tertiary-container": "#282c2e"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "unit-md": "16px",
                  "touch-target": "48px",
                  "unit-xs": "4px",
                  "unit-xl": "32px",
                  "margin-page": "16px",
                  "gutter-grid": "12px",
                  "unit-sm": "8px",
                  "unit-lg": "24px"
          },
          "fontFamily": {
                  "body-lg": ["Inter"],
                  "label-sm": ["Inter"],
                  "label-lg": ["Inter"],
                  "headline-sm": ["Inter"],
                  "headline-lg": ["Inter"],
                  "body-md": ["Inter"],
                  "label-md": ["Inter"],
                  "headline-md": ["Inter"]
          },
          "fontSize": {
                  "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "label-sm": ["10px", {"lineHeight": "12px", "fontWeight": "700"}],
                  "label-lg": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                  "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                  "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                  "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm flex items-center justify-between px-margin-page h-touch-target z-50">
<div class="flex items-center gap-unit-md">
<button class="active:scale-95 transition-transform text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary dark:text-primary-fixed">Pre-Trip Inspection</h1>
</div>
<button class="active:scale-95 transition-transform text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="mt-touch-target px-margin-page py-unit-lg max-w-md mx-auto">
<!-- Screen Header -->
<div class="mb-unit-xl">
<span class="inline-block px-unit-sm py-unit-xs bg-error-container text-on-error-container rounded-full font-label-md text-label-md mb-unit-sm">Flagged Item</span>
<h2 class="font-headline-md text-headline-md text-primary mb-unit-xs">Brake Line Leak</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Provide details for the discovered technical failure.</p>
</div>
<!-- Issue Photo Section -->
<div class="mb-unit-xl">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-unit-sm">Evidence Photo</label>
<div class="relative rounded-xl overflow-hidden bg-surface-container-high border border-outline-variant aspect-video shadow-sm">
<img alt="Inspection issue photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uhoGk0hLMGQHmdxa9ajc-AfZwlvofZ1g7kLUWsMvL2XL3s8agUNcpIM7GQFwnE_f8PLmLwWZkMr8gaOqpaapbLKUlvc6CvNnyoEy6b1Mjfi0vpFoaKEA8kvS9_Kgr9w8SSNAOES8RWAmfiXlqG8PhbafSguJpON4IATDYTiNrJSIqLWdDDdcZ7C3m1hP6hsVrcpfahONQHmTVfi-jfsttLoxRDyZE7A0x-bUT8ABLXloeJzQLLwowUHssk"/>
<div class="absolute bottom-unit-sm right-unit-sm">
<button class="flex items-center gap-unit-xs bg-primary/90 text-on-primary px-unit-md py-unit-sm rounded-lg shadow-lg backdrop-blur-sm active:scale-95 transition-transform font-label-lg text-label-lg">
<span class="material-symbols-outlined text-[18px]">photo_camera</span>
            Re-take Photo
          </button>
</div>
</div>
</div>
<!-- Form Section -->
<div class="space-y-unit-lg">
<!-- Issue Description -->
<div class="space-y-unit-sm">
<label class="block font-label-lg text-label-lg text-on-surface-variant" for="description">Issue Description</label>
<textarea class="w-full rounded-lg border border-outline bg-surface-container-lowest p-unit-md font-body-md text-body-md focus:border-2 focus:border-primary focus:ring-0 placeholder:text-outline" id="description" placeholder="Describe the leak location and severity..." rows="4"></textarea>
</div>
<!-- Severity Picker -->
<div class="space-y-unit-sm">
<label class="block font-label-lg text-label-lg text-on-surface-variant">Severity Level</label>
<div class="grid grid-cols-3 gap-unit-sm">
<button class="flex flex-col items-center justify-center p-unit-sm border-2 border-outline-variant rounded-xl active:scale-95 transition-all bg-surface hover:bg-surface-container-low">
<span class="material-symbols-outlined text-on-surface-variant mb-1">info</span>
<span class="font-label-md text-label-md">Minor</span>
</button>
<button class="flex flex-col items-center justify-center p-unit-sm border-2 border-secondary-container bg-secondary-container/10 rounded-xl active:scale-95 transition-all">
<span class="material-symbols-outlined text-secondary mb-1">warning</span>
<span class="font-label-md text-label-md text-on-secondary-fixed-variant">Major</span>
</button>
<button class="flex flex-col items-center justify-center p-unit-sm border-2 border-outline-variant rounded-xl active:scale-95 transition-all bg-surface hover:bg-surface-container-low">
<span class="material-symbols-outlined text-error mb-1">report</span>
<span class="font-label-md text-label-md">OOS</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-unit-md">
<button class="w-full bg-primary text-on-primary py-touch-target rounded-lg font-headline-sm text-headline-sm shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-unit-sm">
<span class="material-symbols-outlined">save</span>
          Save Issue
        </button>
<button class="w-full mt-unit-sm py-unit-md text-on-surface-variant font-label-lg text-label-lg hover:bg-surface-container-low rounded-lg transition-colors">
          Discard Draft
        </button>
</div>
</div>
<!-- Technical Specs Bento Element -->
<div class="mt-unit-xl p-unit-md bg-surface-container rounded-xl border border-outline-variant flex items-center gap-unit-md">
<div class="p-unit-sm bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary">analytics</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Asset #4402 - Volvo VNL</p>
<p class="font-body-md text-body-md font-bold text-primary">Compliance System Active</p>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-unit-md pb-unit-sm pt-unit-xs bg-surface-container/80 dark:bg-surface-container-high/80 backdrop-blur-md rounded-t-xl shadow-lg">
<!-- Active State: Inspections -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="fact_check">fact_check</span>
<span class="font-label-sm text-label-sm">Inspections</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-secondary-fixed-dim/20 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-sm text-label-sm">Logs</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-secondary-fixed-dim/20 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="distance">distance</span>
<span class="font-label-sm text-label-sm">Routes</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-secondary-fixed-dim/20 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-label-sm text-label-sm">Account</span>
</button>
</nav>
</body></html>
